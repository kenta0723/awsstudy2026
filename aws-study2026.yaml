AWSTemplateFormatVersion: "2010-09-09"
Description:  講座24の課題

Parameters:
  KeyName:
    Type: "AWS::EC2::KeyPair::KeyName"

  DBMasterusername:
    Description: DBmasterusername
    Type: String
  
  DBMasterPassword:
    Description: DBmasterPassword
    NoEcho: true
    Type: String
    MinLength: 8

  MyIP:
    Description: IPAddless(123.456.xxx.xxx/32)
    Type: String
    AllowedPattern: '.*\/32$'
    ConstraintDescription: CIDR形式で、末尾を/32にして下さい（例： 123.456.789.10/32）

  MyEmailAddless:
    Description: Myemailaddless(○○○○@○○○）
    Type: String

  
Resources:  #Resourcesは必須
  
  #-------------------------
  #VPC
  #-------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      InstanceTenancy: default
      Tags: 
      - Key: Name
        Value: aws-study-VPC

  #-------------------------
  #Subnet
  #-------------------------
  
  #public

  Publicsubnet1a:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ''] #AZは再現性の意味でも直接は書かない
      CidrBlock: 10.0.0.0/20 #同上の意味でも指定はダメだが講座通りという事で割愛。
      MapPublicIpOnLaunch: true
      Tags: 
      - Key: Name
        Value: aws-study-publicsubnet1a
      VpcId: !Ref VPC

  Publicsubnet1c:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ''] 
      CidrBlock: 10.0.16.0/20 
      MapPublicIpOnLaunch: true
      Tags: 
      - Key: Name
        Value: aws-study-publicsubnet1c
      VpcId: !Ref VPC

  #private

  PrivateSubnet1a:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ''] 
      CidrBlock: 10.0.128.0/20 
      MapPublicIpOnLaunch: false
      Tags: 
      - Key: Name
        Value: aws-study-privatesubnet1a
      VpcId: !Ref VPC

  PrivateSubnet1c:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Select [1, !GetAZs ''] 
      CidrBlock: 10.0.144.0/20 
      MapPublicIpOnLaunch: false
      Tags: 
      - Key: Name
        Value: aws-study-privatesubnet1c

      VpcId: !Ref VPC

  #DB用subnetgroup
  rdsDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: rdsDBSubnetGroup
      DBSubnetGroupName: DBSubnetGroup
      SubnetIds:
        - !Ref PrivateSubnet1a
        - !Ref PrivateSubnet1c
      Tags:
        - Key: Name
          Value: RDSDBSubnetGroup
  #-------------------------
  #IGW
  #-------------------------
  IGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: Internetgateway

  AttachGateway: #IGWをVPCに関連付けるために必要
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref IGW

  #-------------------------
  #Routetable
  #-------------------------
  RouteTablepublicsubnet: #パブリックサブネット用
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: RouteTable publicsubnet

  routeTableAssociation1a: #ルートテーブルとサブネットの紐づけ
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Publicsubnet1a
      RouteTableId: !Ref RouteTablepublicsubnet
  
  routeTableAssociation1c: 
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Publicsubnet1c
      RouteTableId: !Ref RouteTablepublicsubnet

  PublicRoute: #パブリックルートの設定
    Type: AWS::EC2::Route
    DependsOn: AttachGateway #先にIGWとVPCを紐づける事を優先。
    Properties:
      RouteTableId: !Ref RouteTablepublicsubnet
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  #-------------------------
  #security-group
  #-------------------------

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: aws-study-ec2-sg
      GroupDescription: publicsubnet-1a
      VpcId: !Ref VPC

      SecurityGroupIngress:
        - IpProtocol: tcp
          CidrIp: !Ref MyIP
          FromPort: 22
          ToPort: 22
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ELBSecurityGroup
          #ELBSecurityGroup→EC2に来た通信を参照する場合はcidrIpは不要
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ELBSecurityGroup
          
      Tags:
        - Key: Name
          Value: Security-group

  #DB用security-group

  RDSDBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref VPC
      GroupDescription: RDSSecurityGroup

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref SecurityGroup

      Tags:
        - Key: Name
          Value: RDS-SG


   #ELB用security-group
 
  ELBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: ELBsecurityGroup
      GroupDescription: ELBSecurityGroup
      VpcId: !Ref VPC

      SecurityGroupIngress:
        - IpProtocol: tcp
          CidrIp: 0.0.0.0/0
          FromPort: 80
          ToPort: 80
        - IpProtocol: tcp
          CidrIp: 0.0.0.0/0
          FromPort: 443
          ToPort: 443

      Tags:
        - Key: Name
          Value: ELB-Securitygroup
    

  #-------------------------
  #EC2
  #-------------------------
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      KeyName: !Ref KeyName
      ImageId: ami-0599b6e53ca798bb2
      InstanceType: t3.micro
      SubnetId: !Ref Publicsubnet1a
      SecurityGroupIds:
        - !Ref SecurityGroup
      Tags:
        - Key: Name
          Value: EC2-instance

  #-------------------------
  #RDS
  #-------------------------

  RDSDBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: 20
      DBInstanceClass: db.t4g.micro
      AutoMinorVersionUpgrade: true
      AvailabilityZone: !Select [0, !GetAZs '']
      BackupRetentionPeriod: 1
      DBName: awsstudy
      DBParameterGroupName: default.mysql8.0
      DBSubnetGroupName: !Ref rdsDBSubnetGroup
      Engine: mysql
      EngineVersion: 8.0.43
      MasterUsername: !Ref DBMasterusername
      MasterUserPassword: !Ref DBMasterPassword
      StorageEncrypted: true
      StorageType: gp2
      VPCSecurityGroups:
        - !Ref RDSDBSecurityGroup

      Tags:
        - Key: Name
          Value: RDS

    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot

    
  #-------------------------
  #ELB-TargetGroup
  #-------------------------

  LoadBalancerTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: aws-study-tg
      VpcId: !Ref VPC

      HealthCheckIntervalSeconds: 30
      HealthCheckPath: /
      HealthCheckPort: 8080
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 5
      Matcher: 
        HttpCode: '200,300,301'

      Port: 8080
      Protocol: HTTP
      ProtocolVersion: HTTP1
      Targets: 
        - Id: !Ref EC2Instance

      TargetType: instance
      UnhealthyThresholdCount: 2

      Tags: 
        - Key: Name
          Value: ECB-TargetGroup


  #-------------------------
  #ALB
  #-------------------------

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      IpAddressType: ipv4
      Name: aws-study-elb
      Scheme: internet-facing
      SecurityGroups: 
         - !Ref ELBSecurityGroup
      Subnets: 
        - !Ref Publicsubnet1a
        - !Ref Publicsubnet1c
      Tags: 
        - Key: Name
          Value: ELB

  #-------ListenerRule-------

  ELBListeners:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions: 
        - TargetGroupArn: !Ref LoadBalancerTargetGroup
          Type: forward
      LoadBalancerArn: !Ref ALB
      # ARN = Amazon Resource Name=リソース名
      Port: 80
      Protocol: HTTP


  #-------Cloudwatch----------

  CloudWatchAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      ComparisonOperator: GreaterThanOrEqualToThreshold
  #--- N 回の評価のうち、「しきい値超過」が M 回存在したらアラートにする ---
  #---NがEvaluationPeriods　MがDatapointsToAlarm---
      EvaluationPeriods: 1
      DatapointsToAlarm: 1

      Period: 300
      Statistic: Average
      Threshold: 0.1

      AlarmDescription: "EC2のアラーム使用率が5分間で0.1を超えたらトリガー"
      AlarmName: EC2CPUUtilization
      Dimensions: 
        - Name: InstanceId
          Value: !Ref EC2Instance
          
      ActionsEnabled: true
      AlarmActions:
        - !Ref AmazonsnsTopic

  #-------Amazon SNSTopic-------

  AmazonsnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: aws-study-topic  
  #---Eメールはスタック作成時に手動で入力することで確実に通知が来るように設定。
      Subscription: 
        - Protocol: email 
          Endpoint: !Ref MyEmailAddless


  #------WAF-------

  WebACL:
    Type: AWS::WAFv2::WebACL   
    Properties:    
      Name: aws-study-acl
      Scope: REGIONAL
      DefaultAction: # DefaultAction には「Actionオブジェクト」を入れる仕様なので「｛｝」を使用　※DefaultAction:Allow だと文字列としての認識なのでNG 
        Allow: {}
      VisibilityConfig: 
         CloudWatchMetricsEnabled: true
         MetricName: aws-study-waf
         SampledRequestsEnabled: true   
      Rules: 
       - Name: AWS-AWSManagedRulesCommonRuleSet
         Priority: 1
         Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
         OverrideAction:
            None: {}
         VisibilityConfig: 
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesCommonRuleSet
            SampledRequestsEnabled: true

  #------WebACLAssociation------ #WAFをどこに連携するのか（今回はALB）を設定する。
  WebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !GetAtt  ALB.LoadBalancerArn #Arn属性を求められているので！GetAtt ※リソース名.属性名→ALB.LoadBalancerArn
      WebACLArn: !GetAtt  WebACL.Arn

  #------CloudWatchLogsGroup------ #WAFのトラフィックログの出力元を設定
  CloudWatchLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: aws-waf-logs-study #WAFログのcloudwatchlogsの場合はaws-[waf-log]-にしないといけない。
      Tags:
        - Key: Name
          Value: CloudwatchLogsGroup

  #------LoggingConfiguration------- #WAFのトラフィックログの出力先を設定
  WAFLoggingConfiguration:
    Type: AWS::WAFv2::LoggingConfiguration
    Properties:
      ResourceArn: !GetAtt  WebACL.Arn #ログを出す方
      LogDestinationConfigs: #ログの保存先
        - !GetAtt CloudWatchLogsGroup.Arn


  WAFLogsResourcePolicy:
    Type: AWS::Logs::ResourcePolicy
    Properties:
      PolicyName: WAFLogsResourcePolicy
      PolicyDocument: | # |←これは複数行文字列（横にずらずら並べなくても縦に書いても文字列として認識してもらえる
        {
          "Version": "2012-10-17",
          "Statement": [   
            {
              "Sid": "AWSWAFLogsToCloudWatch",
              "Effect": "Allow",
              "Principal": {
                "Service": "waf.amazonaws.com"
              },
              "Action": [
                "logs:CreateLogStream",
                "logs:PutLogEvents"
              ],
             "Resource": "arn:aws:logs:*:*:log-group:aws-waf-logs-*" 
            }
          ] 
        }